apiVersion: v1alpha1
name: seaweedfs
tag: 4.17.0-p1
protected: false
description: |
  SeaweedFS is a simple and highly scalable distributed file system. There are the objectives to store billions of files and to serve the files fast!
usage:
  text: |
    SeaweedFS is a simple and highly scalable distributed file system.
    Access the console at {{ .Context.defaultStorage.provider.endpoints.console 
       | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace 
       | replace "{{ .Release.metadata.name }}" .Release.metadata.name 
       | replace "{{ .Context.ingress.suffix }}" .Context.ingress.suffix }}
schema:
  parameters:
    properties:
      username: { type: string, required: true, default: "admin" }
      password: { type: string, required: true, default: "admin123" }
      volumeReplicas: { type: integer, required: true, default: 1 }
      masterStorage: { type: string, required: true, default: "1" }
      masterLogStorage: { type: string, required: true, default: "0.5" }
      volumeStorage: { type: string, required: true, default: "2" }
      filerStorage: { type: string, required: true, default: "0.5" }
      filerLogStorage: { type: string, required: true, default: "0.5" }
  context:
    properties:
      certificateIssuers:
        required: true
        properties:
          selfSigned:
            properties:
              name: { type: string, required: true }
      storageClass:
        required: true
        properties:
          data: { type: string, required: true }
      ingress:
        required: true
        properties:
          suffix: { type: string, required: true }
modules:
  - name: auth-config
    source:
      local:
        path: ./auth-config
    values: |
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.ingress.suffix -}}
      
      {{- $databaseId := .Context.defaultStorage.settings.filer.database.provider -}}
      {{- $databaseProvider := (index .Context $databaseId).provider -}}
      {{- $databaseHost := $databaseProvider.connection.host
        | replace "{{ .Release.namespace }}" $namespace
        | replace "{{ .Release.metadata.name }}" $release
        | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $databasePort := printf "%v" $databaseProvider.connection.port -}}  

      iamConfig:
        sts:
          tokenDuration: "1h"
          maxSessionLength: "12h"
          issuer: "seaweedfs-sts"
          signingKey: ""
      
        # -- IAM policies to define in the SeaweedFS IAM config.
        policies:
          - name: "S3WritePolicy"
            document:
              Version: "2012-10-17"
              Statement:
                - Effect: "Allow"
                  Action: ["s3:List*","s3:Get*","s3:Put*","s3:DeleteObject"]
                  Resource: ["*"]
        
        # -- IAM roles to define in the SeaweedFS IAM config.
        roles:
          - roleName: "S3WriteRole"
            roleArn: "{{ .Context.defaultStorage.settings.s3.sts.roleArn }}"
            attachedPolicies: ["S3WritePolicy"]
            trustPolicy:
              Version: "2012-10-17"
              Statement:
                # Polaris uses Credentials-based STS AssumeRole
                - Effect: "Allow"
                  Principal: "*"
                  Action:
                    - "sts:AssumeRole"
      
      s3Config:
        enabled: true
        secretName: {{ .Context.defaultStorage.settings.s3.s3_secret }}
        identities:
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.seaweedfs.identity }}
            credentialsSecret:
              name: {{ .Context.defaultStorage.settings.s3.credentialsSecret.name }}
              accessKeyKey: {{ .Context.defaultStorage.settings.s3.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.defaultStorage.settings.s3.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.seaweedfs.actions | default list | toJson }}
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.hiveMetastore.identity }}
            credentialsSecret:
              name: {{ .Context.hiveMetastore.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.hiveMetastore.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.hiveMetastore.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.hiveMetastore.actions | default list | toJson }}
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.trino.identity }}
            credentialsSecret:
              name: {{ .Context.trino.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.trino.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.trino.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.trino.actions | default list | toJson }}
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.jupyterHub.identity }}
            credentialsSecret:
              name: {{ .Context.jupyterHub.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.jupyterHub.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.jupyterHub.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.jupyterHub.actions | default list | toJson }}
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.sparkHistory.identity }}
            credentialsSecret:
              name: {{ .Context.sparkHistory.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.sparkHistory.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.sparkHistory.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.sparkHistory.actions | default list | toJson }}
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.examples.identity }}
            credentialsSecret:
              name: {{ .Context.examples.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.examples.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.examples.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.examples.actions | default list | toJson }}
          # The Polaris SeaweedFS identity for STS
          - name: {{ .Context.defaultStorage.settings.s3.advanced.identities.polaris.identity }}
            credentialsSecret:
              name: {{ .Context.polaris.storage.credentialsSecret.name }}
              accessKeyKey: {{ .Context.polaris.storage.credentialsSecret.accessKeyKey }}
              secretKeyKey: {{ .Context.polaris.storage.credentialsSecret.secretKeyKey }}
            actions: {{ .Context.defaultStorage.settings.s3.advanced.identities.polaris.actions | default list | toJson }}

      filer:
        auth:
          method: basic
          basic:
            create_auth_secret: creds-seaweedfs-filer-basic
            username: {{ .Parameters.username }}
            password: {{ .Parameters.password }}

  - name: main
    dependsOn:
      - auth-config
    timeout: 10m
    source:
      helmRepository:
        url: https://seaweedfs.github.io/seaweedfs/helm
        chart: seaweedfs
        version: 4.17.0
    values: |
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.ingress.suffix -}}
      
      {{- $seaweedfsS3Url := .Context.defaultStorage.provider.endpoints.api 
         | replace "{{ .Release.namespace }}" $namespace
         | replace "{{ .Release.metadata.name }}" $release
         | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $seaweedfsFilerUrl := .Context.defaultStorage.provider.endpoints.console 
         | replace "{{ .Release.namespace }}" $namespace
         | replace "{{ .Release.metadata.name }}" $release
         | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $seaweedfsS3Host := regexReplaceAll "^https?://" $seaweedfsS3Url "" -}}
      {{- $seaweedfsFilerHost := regexReplaceAll "^https?://" $seaweedfsFilerUrl "" -}}
      
      nameOverride: "{{ .Release.metadata.name }}"
      fullnameOverride: "{{ .Release.metadata.name }}"

      global:
        imageName: chrislusf/seaweedfs
      
      image:
        tag: "4.17"

      master:
        enabled: true
        replicas: 1
        data:
          type: "persistentVolumeClaim"
          storageClass: "{{ .Context.storageClass.workspace }}"
          size: "{{ .Parameters.masterStorage }}Gi"

        logs:
          type: "persistentVolumeClaim"
          storageClass: "{{ .Context.storageClass.workspace }}"
          size: "{{ .Parameters.masterLogStorage }}Gi"
      
      volume:
        enabled: true
        replicas: {{ .Parameters.volumeReplicas }}
        dataDirs:
          - name: data
            type: "persistentVolumeClaim"
            storageClass: "{{ .Context.storageClass.workspace }}"
            size: "{{ .Parameters.volumeStorage }}Gi"
            maxVolumes: 0

      filer:
        enabled: true
        replicas: 1
        enablePVC: true
        port: 8888
        data:
          type: "persistentVolumeClaim"
          storageClass: "{{ .Context.storageClass.workspace }}"
          size: "{{ .Parameters.filerStorage }}Gi"
        logs:
          type: "persistentVolumeClaim"
          storageClass: "{{ .Context.storageClass.workspace }}"
          size: "{{ .Parameters.filerLogStorage }}Gi"
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "130m"
            cert-manager.io/cluster-issuer: "{{ .Context.certificateIssuers.selfSigned.name }}"
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: creds-seaweedfs-filer-basic
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
          host: {{ $seaweedfsFilerHost }}
          path: "/"
          pathType: Prefix
          tls:
            - secretName: seaweedfs-filer-tls
              hosts:
                - {{ $seaweedfsFilerHost }}
      
      s3:
        enabled: {{ .Context.defaultStorage.settings.s3.enabled }}
        enableAuth: true
        existingConfigSecret: {{ .Context.defaultStorage.settings.s3.s3_secret }}
        createBuckets:
          - name: {{ .Context.hiveMetastore.storage.bucket }}
            anonymousRead: {{ .Context.defaultStorage.settings.s3.bucketAnonymousRead }}
          - name: {{ .Context.sparkHistory.storage.bucket }}
            anonymousRead: {{ .Context.defaultStorage.settings.s3.bucketAnonymousRead }}
      
        extraVolumes: |
          - name: auth-config
            configMap:
              name: {{ .Release.metadata.name }}-auth-config
  
        extraVolumeMounts: |
          - name: auth-config
            mountPath: /etc/seaweed/iam
            readOnly: true
        {{- if .Context.defaultStorage.settings.s3.sts.enabled }}
        extraArgs:
          - "-iam.config=/etc/seaweed/iam/iam.json"
        {{- end }}
      
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "130m"
            cert-manager.io/cluster-issuer: "{{ .Context.certificateIssuers.selfSigned.name }}"
          host: {{ $seaweedfsS3Host }}
          path: "/"
          pathType: Prefix
          tls:
            - secretName: seaweedfs-s3-tls
              hosts:
              - {{ $seaweedfsS3Host }}

roles:
  - storage
dependencies:
  - ingress
  # - database-server
