apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auth-config.fullname" . }}
  labels:
    {{- include "auth-config.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  iam.json: |
    {{- $root := dict -}}
    {{- $iam := (.Values.iamConfig | default dict) -}}
    
    {{- /* STS section */ -}}
    {{- $_ := set $root "sts" (dict
          "tokenDuration" (dig "sts" "tokenDuration" nil $iam)
          "maxSessionLength" (dig "sts" "maxSessionLength" nil $iam)
          "issuer" (dig "sts" "issuer" nil $iam)
          "signingKey" (dig "sts" "signingKey" nil $iam)
          ) -}}
    
    {{- /* Providers section (optional) */ -}}
    {{- $providers := list -}}
    {{- $oidc := (dig "providers" "oidc" nil $iam | default dict) -}}
    {{- if (default false $oidc.enabled) -}}
      {{- $providerCfg := dict -}}
    
      {{- /* Only set fields if user provided them (generic OIDC) */ -}}
      {{- if $oidc.issuer }}{{- $_ := set $providerCfg "issuer" $oidc.issuer -}}{{- end -}}
      {{- if $oidc.clientId }}{{- $_ := set $providerCfg "clientId" $oidc.clientId -}}{{- end -}}
      {{- if $oidc.jwksUri }}{{- $_ := set $providerCfg "jwksUri" $oidc.jwksUri -}}{{- end -}}
      {{- if $oidc.userInfoUri }}{{- $_ := set $providerCfg "userInfoUri" $oidc.userInfoUri -}}{{- end -}}
    
      {{- $scopesList := list -}}
      {{- if $oidc.scopes -}}
        {{- /* Explicit list wins */ -}}
        {{- $scopesList = $oidc.scopes -}}
      {{- else if $oidc.scope -}}
        {{- /* Split on whitespace, '+' or ',' and drop empties */ -}}
        {{- $raw := trim $oidc.scope -}}
        {{- $parts := regexSplit "[\\s,+]+" $raw -1 -}}
        {{- $scopesList = compact $parts -}}
      {{- end -}}
      {{- if gt (len $scopesList) 0 -}}
        {{- $_ := set $providerCfg "scopes" $scopesList -}}
      {{- end -}}
    
      {{- /* Role mapping is optional (OIDC only) */ -}}
      {{- $rm := dict -}}
      {{- $rmIn := (dig "roleMapping" nil $oidc | default dict) -}}
      {{- if $rmIn.rules }}{{- $_ := set $rm "rules" $rmIn.rules -}}{{- end -}}
      {{- if $rmIn.defaultRole }}{{- $_ := set $rm "defaultRole" $rmIn.defaultRole -}}{{- end -}}
      {{- if gt (len $rm) 0 }}{{- $_ := set $providerCfg "roleMapping" $rm -}}{{- end -}}
    
      {{- /* Allow provider-specific extra config fields */ -}}
      {{- if $oidc.configExtra -}}
        {{- $providerCfg = merge $providerCfg $oidc.configExtra -}}
      {{- end -}}
    
      {{- $providers = list (dict
            "name" (default "oidc-provider" $oidc.providerName)
            "type" (default "oidc" $oidc.providerType)
            "enabled" (default false $oidc.enabled)
            "config" $providerCfg
          ) -}}
    {{- end -}}
    {{- $_ := set $root "providers" $providers -}}
    
    {{- /* Policies + Roles */ -}}
    {{- $_ := set $root "policies" (default list (dig "policies" nil $iam)) -}}
    {{- $_ := set $root "roles" (default list (dig "roles" nil $iam)) -}}
    
    {{- toPrettyJson $root | nindent 4 }}