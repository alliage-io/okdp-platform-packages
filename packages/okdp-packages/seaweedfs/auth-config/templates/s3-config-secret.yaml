{{- if and .Values.s3Config.enabled (gt (len (.Values.s3Config.identities | default list)) 0) -}}
{{- $secretName := required "s3Config.secretName is required when s3Config.enabled=true" .Values.s3Config.secretName -}}
{{- $ns := .Release.Namespace -}}
{{- $idents := list -}}

{{- range $i, $id := .Values.s3Config.identities -}}
{{- $cs := $id.credentialsSecret -}}
{{- if not $cs -}}
{{- fail (printf "auth-config: s3Config.identities[%d].credentialsSecret is required" $i) -}}
{{- end -}}

{{- $ak := include "auth-config.lookupSecretDataB64dec" (dict "namespace" $ns "secretName" $cs.name "key" $cs.accessKeyKey) -}}
{{- $sk := include "auth-config.lookupSecretDataB64dec" (dict "namespace" $ns "secretName" $cs.name "key" $cs.secretKeyKey) -}}

{{- $idents = append $idents (dict
      "name" $id.name
      "credentials" (list (dict "accessKey" $ak "secretKey" $sk))
      "actions" ($id.actions | default list)
      ) -}}
{{- end -}}

{{- $cfg := dict "identities" $idents -}}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $secretName | quote }}
  namespace: {{ $ns | quote }}
  {{- with .Values.s3Config.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "auth-config.labels" . | nindent 4 }}
stringData:
  seaweedfs_s3_config: {{ $cfg | toJson | quote }}
{{- end -}}
