{{- $root := . -}}
{{- range $db := $root.Values.databases }}
{{- if $db.schemas }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cnpg-postgresql.fullname" $root }}-{{ $db.name }}-schemas
  labels:
    {{- include "cnpg-postgresql.labels" $root | nindent 4 }}
  {{- with $root.Values.job.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ttlSecondsAfterFinished: {{ $root.Values.job.ttlSecondsAfterFinished }}
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-schemas
          image: {{ printf "%s:%v" $root.Values.image.repository $root.Values.image.tag }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              
              HOST="{{ include "cnpg-postgresql.fullname" $root }}-rw"
              USER="{{ $db.owner.username }}"
              DB="{{ $db.name }}"
              
              echo "⏳ Waiting for PostgreSQL service ${HOST}..."
              for i in $(seq 1 300); do
                if pg_isready -h "${HOST}" -U "${USER}" -d postgres >/dev/null 2>&1; then
                  if psql -h "${HOST}" -U "${USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${DB}';" | grep -q 1; then
                    if psql -h "${HOST}" -U "${USER}" -d "${DB}" -tAc "SELECT 1" >/dev/null 2>&1; then
                      echo "✅ Database ${DB} is ready and accepting connections"
                      DB_READY=true
                      break
                    fi
                  fi
                fi
              
                echo "Still waiting for database ${DB}... (${i}/300)"
                sleep 2
              done
              
              if [ "${DB_READY:-false}" != "true" ]; then
                echo "❌ Database ${DB} not ready after waiting. Exiting."
                exit 1
              fi
              
              {{- range $schema := $db.schemas }}
              echo "👉 Creating schema: {{ $schema }}"
              psql -h "${HOST}" \
                   -U "${USER}" \
                   -d "${DB}" \
                   -c "CREATE SCHEMA IF NOT EXISTS {{ $schema }};"
              {{- end }}
              
              echo "✅ All schemas created successfully."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-owner-secret" $db.owner.username) $db.owner.passwordSecret }}
                  key: password
---
{{- end }}
{{- end }}
