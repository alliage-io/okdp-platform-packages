apiVersion: v1alpha1
name: trinodb
#tag: 480-p01
# Currently, the UI requires the version to conform to SemVer (https://simversion.github.io/)
# https://github.com/OKDP/okdp-ui/blob/main/src/app/shared/utils/utils.ts#L131
tag: 480.0.0-p04
protected: false
description: |
  Apache Trino - Distributed SQL query engine designed for large-scale data processing across multiple data sources.
  High-performance, in-memory query engine that enables fast, interactive analytics on diverse data systems.
  Supports querying data from multiple databases, data warehouses, and big data platforms in a single query.
usage:
  text: |
    Apache Trino provides distributed SQL query engine designed for large-scale data processing.
    Access the UI at {{ .Context.trino.endpoints.url | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix }}
schema:
  parameters:
    properties:
      numWorkers: { type: integer, default: 1, description: "Number of workers" }
      workerMemoryGi: { type: number, default: 2, multipleOf: 0.25, description: "Worker memory (GiB) used for Kubernetes requests/limits (recommended: request=limit)." }
      workerCpu: { type: number, default: 0.5, multipleOf: 0.25, description: "Worker CPU request in millicores (e.g., 500=0.5 vCPU, 1000=1 vCPU)." }
      enableOPA: { type: boolean, default: true, description: "Whether to enable OPA" }
      policyRepoUrl: { type: string, default: "https://github.com/OKDP/trino-opal-example-policy.git", description: "OPA policy repo URL" }
      policyRepoMainBranch: { type: string, default: "master", description: "OPA policy repo branch" }
      defaultclientScopes: { type: string, default: "web-origins acr roles profile groups basic email", description: "Default Trino client's clientScopes" }
      optionalClientScopes: { type: string, default: "address phone organization offline_access microprofile-jwt", description: "Optional Trino client's clientScopes" }
      dcrEnable: { type: boolean, default: true, description: "Whether to enable Dynamic Client Registration" }
      keycloakAdminUser: { type: string, default: "admin", description: "Keycloak Admin username" }
      keycloakAdminPassword: { type: string, default: "admin", description: "Keycloak Admin password" }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }

modules:
  - name: opa
    timeout: 10m
    source:
      helmRepository:
        url: https://open-policy-agent.github.io/kube-mgmt/charts
        chart: opa-kube-mgmt
        version: 11.0.7
    values: |
      fullnameOverride: {{ .Release.metadata.name }}-opa
      authz:
        enabled: false
      image:
        repository: openpolicyagent/opa
        tag: 1.16.1
        pullPolicy: IfNotPresent
      useHttps: false
      port: 8181
      mgmt:
        enabled: false
      rbac:
        create: false
      serviceAccount:
        create: false

  - name: opal-secrets
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/opal-secrets
        tag: 0.1.1
    values: |
      fullnameOverride: {{ .Release.metadata.name }}-opal-secrets
  - name: opal
    dependsOn:
      - opa
      - opal-secrets
    timeout: 10m
    source:
      helmRepository:
        url: https://permitio.github.io/opal-helm-chart
        chart: opal
        version: 0.0.30
    values: |
      image:
        client:
          registry: docker.io
          repository: permitio/opal-client-standalone
          tag: 0.9.4
        server:
          registry: docker.io
          repository: permitio/opal-server
          tag: 0.9.4

      client:
        extraEnv:
          OPAL_POLICY_STORE_URL: http://{{ .Release.metadata.name }}-opa.{{ .Release.spec.targetNamespace }}:8181
        secrets:
          - opal-client-token-secret

      server:
        policyRepoUrl: {{ .Parameters.policyRepoUrl }}
        policyRepoMainBranch: "{{ .Parameters.policyRepoMainBranch }}"
        secrets:
          - opal-ssh-secret
          - opal-master-token-secret

        {{- with .Context.platform.proxy }}
        {{- if or .httpProxy .httpsProxy .noProxy }}
        extraEnv:
          {{- with .httpProxy }}
          HTTP_PROXY: {{ . | quote }}
          {{- end }}
          {{- with .httpsProxy }}
          HTTPS_PROXY: {{ . | quote }}
          {{- end }}
          {{- with .noProxy }}
          NO_PROXY: {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- end }}
  - name: oidc-dcr
    timeout: 10m
    source:
      oci:
        repository: # Add correct Repo
        tag: # Add correct Tag
    values: |
      {{- if .Release.dcrEnable }}
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.trino.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}

      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
            
      ttl_seconds: 30
      registration_url: "{{ $oidcIssuerUri }}/clients-registrations/openid-connect/"
      request:
        application_type: web
        client_name: "{{ $release }}-{{ $namespace }}"
        redirect_uris:
          - "https://trino-{{ $namespace }}.{{ $domain }}/oauth2/callback"
        logo_uri: "https://landscape.cncf.io/logos/008125b82108f19aea6b0004ce5f255b72bab5b5e5c169a302d7bf845edb8e6b.svg"
        grant_types:
          - "authorization_code"
          - "client_credentials"
      tls: 
        insecure: true
        certificate: ""
      secret: "{{ $release }}-{{ $namespace }}-dcr"
      mapping:
        use_default: false
        key_mapping:
          OIDC_CLIENT_ID: ".client_id"
          OIDC_CLIENT_SECRET: ".client_secret"
          OIDC_ISSUER_URL: "{{ $oidcIssuerUri }}"
          OIDC_SCOPES: "{{ printf "%d %o" .Parameters.defaultclientScopes .Parameters.optionalClientScopes | join " " }}"
      {{- end }}
  - name: keycloack-client-configuration
    dependsOn:
      - oidc-dcr
    timeout: 10m
    source:
      helmRepository:
        url: https://jkroepke.github.io/helm-charts/
        chart: keycloak-config-cli
        version: 1.3.6
    values: |
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}

      {{- $oidcId := .Context.trino.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}

      {{- $oidcIssuerUri := $oidcProvider.issuerUri
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
        
      {{- $realmNameId := .Context.defaultIdp.settings.realm.name -}}

      {{- if .Release.dcrEnable }}
      {{- if eq ($oidcProvider.name | toString ) "keycloak" }}
      image:
          repository: docker.io/adorsys/keycloak-config-cli
          tag: 6.4.0-26.1.0
      env:
        KEYCLOAK_URL: "https://keycloak.{{ $domain }}"
        KEYCLOAK_USER: "{{ .Parameters.keycloakAdminUser }}"
        IMPORT_FILES_LOCATIONS: "/config/*"
        IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
        IMPORT_REMOTESTATE_ENABLED: "true"
        IMPORT_MANAGED_CLIENT: "no-delete" # Let other client in place and delete nothing
        KEYCLOAK_TRUSTSTORE: /certs/bundle.p12
        KEYCLOAK_TRUSTSTORE_PASSWORD: ""
        JAVA_OPTS: "-Djavax.net.ssl.trustStore=/certs/bundle.p12 -Djavax.net.ssl.trustStorePassword="
        
      secrets:
        KEYCLOAK_PASSWORD: "{{ .Parameters.keycloakAdminPassword }}"
      extraEnv: 
        - name: CLIENT_ID
          valueFrom:
             secretKeyRef:
               name: {{ $release }}-{{ $namespace }}-dcr
               key: OIDC_CLIENT_ID
        - name: CLIENT_SECRET
          valueFrom:
             secretKeyRef:
               name: {{ $release }}-{{ $namespace }}-dcr
               key: OIDC_CLIENT_SECRET   

      config:
        keycloak_trino:
          inline: |
            realm: {{ $realmNameId }}
            clients:
              - clientId: $(env:CLIENT_ID)
                secret: $(env:CLIENT_SECRET)
                {{- if .Parameters.defaultclientScopes }}
                defaultClientScopes: 
                  {{- range splitList " " .Parameters.defaultclientScopes }}
                  - {{ . }}
                  {{- end }}
                {{- end }}
                {{- if .Parameters.optionalClientScopes }}
                optionalClientScopes: 
                  {{- range splitList " " .Parameters.optionalClientScopes }}
                  - {{ . }}
                  {{- end }}
                {{- end }}
                
      extraVolumes: |
        - name: custom-ca
          configMap:
            name: certs-bundle             
      extraVolumeMounts: |
        - name: custom-ca
          mountPath: /certs/bundle.p12
          subPath: bundle.p12
          readOnly: true
      {{- end }}
      {{- end }}
  - name: main
    dependsOn:
      - opal
    timeout: 10m
    source:
      helmRepository:
        url: https://trinodb.github.io/charts/
        chart: trino
        version: v1.42.1
    values: |

      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}

      {{- $oidcId := .Context.trino.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}

      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}

      {{- $oidcAuthUrl := $oidcProvider.endpoints.authUrl
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}

      {{- $oidcTokenUrl := $oidcProvider.endpoints.tokenUrl
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}

      {{- $oidcJwksUrl := $oidcProvider.endpoints.jwksUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}

      {{- $oidcScopes := (default "openid profile email groups" .Context.trino.oidc.scope) | replace " " "," -}}

      {{- $trinoEndpoint := .Context.trino.endpoints.url
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain
            | trimPrefix "https://"
            | trimPrefix "http://" -}}
      {{- $trinoConnectionsRaw := (.Context.trino.connections | default list) -}}
      {{- if not (kindIs "slice" $trinoConnectionsRaw) }}
        {{- fail "context.trino.connections must be a list" -}}
      {{- end }}
      {{- $trinoConnections := dict -}}
      {{- range $connection := $trinoConnectionsRaw }}
        {{- if not (and $connection $connection.name) }}
          {{- fail "each item in context.trino.connections must define name" -}}
        {{- end }}
        {{- $_ := set $trinoConnections $connection.name $connection -}}
      {{- end }}
      {{- $selectedCatalogs := (.Context.trino.catalogs | default list) -}}

      image:
        repository: trinodb/trino
        tag: 480

      catalogs:
        {{- if gt (len $trinoConnections) 0 }}
        {{- range $catalogName := $selectedCatalogs }}
          {{- $catalog := index $trinoConnections $catalogName -}}
          {{- if $catalog }}
          {{- $catalogEnvPrefix := upper (replace "." "_" (replace "-" "_" $catalogName)) -}}
          {{- $catalogProps := $catalog.properties -}}
          {{- $catalogServiceId := dig "service" "name" "" $catalog -}}
          {{- $catalogOidc := (dig "service" "oidc" nil $catalog | default $catalog.oidc | default (dig "auth" "oidc" nil $catalog)) -}}
          {{- $catalogStorage := (dig "storage" nil $catalog | default dict) -}}
          {{- $catalogStorageProviderId := (dig "provider" "" $catalogStorage) -}}
          {{- $catalogStorageCredentialsSecret := (dig "credentialsSecret" nil $catalogStorage) -}}

          {{- $catalogProps = $catalogProps
                | replace "{{ connection.name }}" $catalogName -}}

          {{- if $catalogServiceId }}
            {{- $catalogService := index $.Context $catalogServiceId -}}
            {{- $catalogServiceUrl := $catalogService.endpoints.url
                  | replace "{{ .Release.namespace }}" $namespace
                  | replace "{{ .Release.metadata.name }}" $release
                  | replace "{{ .Context.ingress.suffix }}" $domain -}}
            {{- $catalogProps = $catalogProps
                  | replace "{{ service.endpoint.url }}" $catalogServiceUrl
                  | replace "{{ service.endpoints.url }}" $catalogServiceUrl
                  | replace "{{ dataSource.endpoint.url }}" $catalogServiceUrl
                  | replace "{{ dataSource.endpoints.url }}" $catalogServiceUrl -}}
          {{- end }}

          {{- if $catalogStorageProviderId }}
            {{- $storageProvider := (index $.Context $catalogStorageProviderId).provider -}}
            {{- $storageApiUrl := $storageProvider.endpoints.apiUrl
                  | replace "{{ .Release.namespace }}" $namespace
                  | replace "{{ .Release.metadata.name }}" $release
                  | replace "{{ .Context.ingress.suffix }}" $domain -}}
            {{- $storageRegion := printf "%v" $storageProvider.region -}}
            {{- $catalogProps = $catalogProps
                  | replace "{{ storage.endpoints.api }}" $storageApiUrl
                  | replace "{{ storage.endpoints.apiUrl }}" $storageApiUrl
                  | replace "{{ storage.region }}" $storageRegion -}}
          {{- end }}

          {{- if and $catalogStorageCredentialsSecret $catalogStorageCredentialsSecret.name
                $catalogStorageCredentialsSecret.accessKeyKey $catalogStorageCredentialsSecret.secretKeyKey }}
            {{- $catalogProps = $catalogProps
                  | replace "${ENV:S3_ACCESS_KEY}" (printf "${ENV:%s_S3_ACCESS_KEY}" $catalogEnvPrefix)
                  | replace "${ENV:S3_SECRET_ACCESS}" (printf "${ENV:%s_S3_SECRET_ACCESS}" $catalogEnvPrefix) -}}
          {{- end }}

          {{- if and $catalogOidc $catalogOidc.provider }}
            {{- $catalogOidcProviderId := $catalogOidc.provider -}}
            {{- $catalogOidcProvider := (index $.Context $catalogOidcProviderId).provider -}}
            {{- $catalogOidcTokenUrl := $catalogOidcProvider.endpoints.tokenUrl
                  | replace "{{ .Release.namespace }}" $namespace
                  | replace "{{ .Release.metadata.name }}" $release
                  | replace "{{ .Context.ingress.suffix }}" $domain -}}
            {{- $catalogProps = $catalogProps
                  | replace "{{ idp.endpoints.token }}" $catalogOidcTokenUrl
                  | replace "{{ idp.endpoints.tokenUrl }}" $catalogOidcTokenUrl
                  | replace "${ENV:client_id}" (printf "${ENV:%s_OIDC_CLIENT_ID}" $catalogEnvPrefix)
                  | replace "${ENV:client_secret}" (printf "${ENV:%s_OIDC_CLIENT_SECRET}" $catalogEnvPrefix)
                  | replace "${ENV:CLIENT_ID}" (printf "${ENV:%s_OIDC_CLIENT_ID}" $catalogEnvPrefix)
                  | replace "${ENV:CLIENT_SECRET}" (printf "${ENV:%s_OIDC_CLIENT_SECRET}" $catalogEnvPrefix) -}}
          {{- end }}

          {{ printf "%s: |\n%s" $catalogName ($catalogProps | indent 2) | nindent 8 }}
          {{- end }}
        {{- end }}
        {{- end }}

      env:
        - name: TRINO_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              {{- if .Release.dcrEnable }}
              name: {{ $release }}-{{ $namespace }}-dcr
              key: OIDC_CLIENT_ID
              {{- else }}
              name: {{ .Context.trino.oidc.credentialsSecret.name }}
              key: {{ .Context.trino.oidc.credentialsSecret.clientIdKey }}
              {{- end }}

        - name: TRINO_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Release.dcrEnable }}
              name: {{ $release }}-{{ $namespace }}-dcr
              key: OIDC_CLIENT_SECRET
              {{- else }}
              name: {{ .Context.trino.oidc.credentialsSecret.name }}
              key: {{ .Context.trino.oidc.credentialsSecret.clientSecretKey }}
              {{- end }}

        - name: TRINO_SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Context.trino.advanced.config.security.credentialsSecret.name }}
              key: {{ .Context.trino.advanced.config.security.credentialsSecret.sharedSecret }}
      
        - name: TRUSTSTORE_PASSWORD
          value: ""
      
        {{- if gt (len $trinoConnections) 0 }}
        {{- range $catalogName := $selectedCatalogs }}
        {{- $catalog := index $trinoConnections $catalogName -}}
        {{- if $catalog }}
        {{- $catalogEnvPrefix := upper (replace "." "_" (replace "-" "_" $catalogName)) -}}
        {{- $catalogOidc := (dig "service" "oidc" nil $catalog | default $catalog.oidc | default (dig "auth" "oidc" nil $catalog)) -}}
        {{- $catalogStorageCredentialsSecret := (dig "storage" "credentialsSecret" nil $catalog) -}}

        {{- if and $catalogStorageCredentialsSecret $catalogStorageCredentialsSecret.name $catalogStorageCredentialsSecret.accessKeyKey $catalogStorageCredentialsSecret.secretKeyKey }}
        - name: {{ printf "%s_S3_ACCESS_KEY" $catalogEnvPrefix }}
          valueFrom:
            secretKeyRef:
              name: {{ $catalogStorageCredentialsSecret.name }}
              key: {{ $catalogStorageCredentialsSecret.accessKeyKey }}

        - name: {{ printf "%s_S3_SECRET_ACCESS" $catalogEnvPrefix }}
          valueFrom:
            secretKeyRef:
              name: {{ $catalogStorageCredentialsSecret.name }}
              key: {{ $catalogStorageCredentialsSecret.secretKeyKey }}
        {{- end }}

        {{- if and $catalogOidc $catalogOidc.credentialsSecret }}
        - name: {{ printf "%s_OIDC_CLIENT_ID" $catalogEnvPrefix }}
          valueFrom:
            secretKeyRef:
              name: {{ $catalogOidc.credentialsSecret.name }}
              key: {{ $catalogOidc.credentialsSecret.clientIdKey }}

        - name: {{ printf "%s_OIDC_CLIENT_SECRET" $catalogEnvPrefix }}
          valueFrom:
            secretKeyRef:
              name: {{ $catalogOidc.credentialsSecret.name }}
              key: {{ $catalogOidc.credentialsSecret.clientSecretKey }}
        {{- end }}

        {{- end }}
        {{- end }}
        {{- end }}

      coordinator:
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "8Gi"
      
        additionalVolumes:
          - name: cacerts
            secret:
              secretName: certs-bundle
      
        additionalVolumeMounts:
          - name: cacerts
            mountPath: /cacerts
            readOnly: true
      
        additionalJVMConfig:
          - "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12"
          - "-Djavax.net.ssl.trustStorePassword=${ENV:TRUSTSTORE_PASSWORD}"
      
      worker:
        resources:
          requests:
            cpu: "{{ .Parameters.workerCpu }}"
            memory: "{{ .Parameters.workerMemoryGi }}Gi"
          limits:
            cpu: "{{ mulf (float64 .Parameters.workerCpu) 2 }}"
            memory: "{{ mulf (float64 .Parameters.workerMemoryGi) 2 }}Gi"
      
        additionalVolumes:
          - name: cacerts
            secret:
              secretName: certs-bundle
      
        additionalVolumeMounts:
          - name: cacerts
            mountPath: /cacerts
            readOnly: true
      
        additionalJVMConfig:
          - "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12"
          - "-Djavax.net.ssl.trustStorePassword=${ENV:TRUSTSTORE_PASSWORD}"
      
      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: "{{ .Context.platform.certificateIssuers.selfSigned.name }}"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          nginx.ingress.kubernetes.io/use-regex: "true"
        hosts:
          - host: {{ $trinoEndpoint }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - {{ $trinoEndpoint }}
            secretName: {{ .Release.metadata.name }}-tls
      
      server:
        workers: {{ .Parameters.numWorkers }}
        node:
          environment: sandbox
        config:
          authenticationType: "oauth2"
          coordinator: "true"
          node-scheduler.include-coordinator: "true"
          discovery-server.enabled: "true"
          path: /etc/trino
          https:
            enabled: false
        workerExtraConfig: ""
        coordinatorExtraConfig: |
          http-server.process-forwarded=true
          web-ui.authentication.type=oauth2
          # Enable two authentication flows on the coordinator:
          # - OAUTH2: interactive browser-based login for human users (UI/CLI with external authentication)
          # - JWT: non-interactive bearer token authentication for automation/service accounts
          #   such as scripts, jobs, or CI/CD using --access-token
          http-server.authentication.type=jwt,oauth2
          http-server.authentication.oauth2.issuer={{ $oidcIssuerUri }}
          http-server.authentication.oauth2.client-id=${ENV:TRINO_OAUTH_CLIENT_ID}
          http-server.authentication.oauth2.client-secret=${ENV:TRINO_OAUTH_CLIENT_SECRET}
          http-server.authentication.oauth2.auth-url={{ $oidcAuthUrl }}
          http-server.authentication.oauth2.token-url={{ $oidcTokenUrl }}
          http-server.authentication.oauth2.scopes={{ $oidcScopes }}
          http-server.authentication.oauth2.principal-field=preferred_username
      
          http-server.authentication.jwt.key-file={{ $oidcJwksUrl }}
          http-server.authentication.jwt.required-issuer={{ $oidcIssuerUri }}
          http-server.authentication.jwt.required-audience=account
          http-server.authentication.jwt.principal-field=client_id
      
      additionalConfigProperties:
        - internal-communication.shared-secret=${ENV:TRINO_SHARED_SECRET}

      {{- if .Parameters.enableOPA }}
      accessControl:
        type: properties
        properties: |
          access-control.name=opa
          opa.policy.uri=http://{{ .Release.metadata.name }}-opa.{{ .Release.spec.targetNamespace }}:8181/v1/data/trino/allow
          opa.log-responses=true
          opa.log-requests=true
      {{- end }}
roles:
  - interactive-query
dependencies:
  - data-catalog
  - ingress
